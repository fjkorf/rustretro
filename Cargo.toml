[package]
name = "rustretro"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
sdl2 = { version = "0.36", features = ["use-pkgconfig"] }
libloading = "0.8"
thiserror = "1.0"
anyhow = "1.0"
memoffset = "0.9"
egui = "0.34.1"
eframe = { version = "0.34.1", default-features = false, features = ["default_fonts", "wgpu"] }
egui_extras = { version = "0.34.1", features = ["all_loaders"] }
image = { version = "0.25", default-features = false, features = ["png"] }

[profile.release]
opt-level = 3
lto = true
